name: Full-Page Screenshot with shot-scraper + Encrypted (No Split)

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Web address to capture full-page screenshot'
        required: true
        type: string
      password:
        description: 'Encryption password for the archive'
        required: true
        type: string
      archive_name:
        description: 'Name of the encrypted archive (without extension) – e.g., myscreenshot'
        required: false
        default: 'screenshot'
        type: string
      output_dir:
        description: 'Directory where the encrypted archive will be stored'
        required: false
        default: 'captures'
        type: string

jobs:
  capture-and-encrypt:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install 7-Zip and Python dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y p7zip-full

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install shot-scraper and Playwright browser
      run: |
        pip install shot-scraper
        shot-scraper install

    - name: Capture full-page screenshot
      run: |
        shot-scraper "${{ inputs.url }}" \
          -o "${{ inputs.archive_name }}.png" \
          --full-page \
          --width 1280
        echo "Screenshot saved: ${{ inputs.archive_name }}.png"

    - name: Create single encrypted archive (no split)
      env:
        ARCHIVE_PASSWORD: ${{ inputs.password }}
        ARCHIVE_BASENAME: ${{ inputs.archive_name }}
      run: |
        7z a -t7z -p"$ARCHIVE_PASSWORD" -mhe=on "${ARCHIVE_BASENAME}.7z" "$ARCHIVE_BASENAME.png"
        rm "$ARCHIVE_BASENAME.png"

    - name: Move encrypted archive to target directory
      run: |
        TARGET_DIR="${{ inputs.output_dir }}"
        mkdir -p "$TARGET_DIR"
        mv "${{ inputs.archive_name }}.7z" "$TARGET_DIR/"

    - name: Commit and Push encrypted archive
      run: |
        git config --global user.name "${{ github.actor }}"
        git config --global user.email "${{ github.actor }}@users.noreply.github.com"
        git add "${{ inputs.output_dir }}"
        git commit -m "Add encrypted full-page screenshot (${{ inputs.archive_name }})" || echo "No changes to commit"
        git push
