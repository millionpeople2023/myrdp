name: Clone Single Page using HTTrack

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Page URL'
        required: true
        type: string
      password:
        description: 'Encryption password'
        required: true
        type: string
      archive_name:
        description: 'Archive name'
        required: false
        default: 'single-page'
      split_size:
        description: 'Split size'
        required: false
        default: '100m'
      output_dir:
        description: 'Output directory'
        required: false
        default: 'splits'

jobs:
  clone:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install httrack and 7-Zip
      run: sudo apt-get update && sudo apt-get install -y httrack p7zip-full

    - name: Clone single page only
      run: |
        httrack "${{ inputs.url }}" -O ./cloned_website \
          --depth=0 \
          --robots=0 \
          --can-go-up=0 \
          --can-go-down=0 \
          --stay-on-same-domain \
          --get-files \
          --mirror

    - name: Archive and encrypt
      run: |
        7z a -t7z -v"${{ inputs.split_size }}" -p"${{ inputs.password }}" -mhe=on "${ARCHIVE_BASENAME}.7z" ./cloned_website
        rm -rf ./cloned_website
      env:
        ARCHIVE_BASENAME: ${{ inputs.archive_name }}

    - name: Push to repo
      run: |
        mkdir -p "${{ inputs.output_dir }}"
        mv "${{ inputs.archive_name }}.7z".* "${{ inputs.output_dir }}/"
        git config user.name "${{ github.actor }}"
        git config user.email "${{ github.actor }}@users.noreply.github.com"
        git add "${{ inputs.output_dir }}"
        git commit -m "Single-page clone of ${{ inputs.url }}" || echo "No changes"
        git push
