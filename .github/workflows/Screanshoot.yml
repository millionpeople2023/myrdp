name: Full-Page Screenshot with Playwright (No Split)

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Web address to capture full-page screenshot'
        required: true
        type: string
      password:
        description: 'Encryption password for the archive'
        required: true
        type: string
      archive_name:
        description: 'Name of the encrypted archive (without extension)'
        required: false
        default: 'screenshot'
        type: string
      output_dir:
        description: 'Directory where the encrypted archive will be stored'
        required: false
        default: 'captures'
        type: string

jobs:
  capture-and-encrypt:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install 7-Zip and Python
      run: |
        sudo apt-get update
        sudo apt-get install -y p7zip-full python3-pip

    - name: Install Playwright
      run: |
        pip install playwright
        playwright install chromium

    - name: Capture full-page screenshot with Python
      run: |
        python3 <<EOF
        import asyncio
        from playwright.async_api import async_playwright

        async def main():
            async with async_playwright() as p:
                browser = await p.chromium.launch()
                page = await browser.new_page(viewport={'width': 1280, 'height': 800})
                await page.goto('${{ inputs.url }}', wait_until='networkidle')
                # اسکرین‌شات از تمام طول صفحه
                await page.screenshot(path='${{ inputs.archive_name }}.png', full_page=True)
                await browser.close()

        asyncio.run(main())
        EOF
        echo "Screenshot saved: ${{ inputs.archive_name }}.png"

    - name: Create single encrypted archive
      env:
        ARCHIVE_PASSWORD: ${{ inputs.password }}
        ARCHIVE_BASENAME: ${{ inputs.archive_name }}
      run: |
        7z a -t7z -p"$ARCHIVE_PASSWORD" -mhe=on "${ARCHIVE_BASENAME}.7z" "${ARCHIVE_BASENAME}.png"
        rm "${ARCHIVE_BASENAME}.png"

    - name: Move encrypted archive to target directory
      run: |
        mkdir -p "${{ inputs.output_dir }}"
        mv "${{ inputs.archive_name }}.7z" "${{ inputs.output_dir }}/"

    - name: Commit and Push
      run: |
        git config --global user.name "${{ github.actor }}"
        git config --global user.email "${{ github.actor }}@users.noreply.github.com"
        git add "${{ inputs.output_dir }}"
        git commit -m "Add encrypted full-page screenshot (${{ inputs.archive_name }})" || echo "No changes"
        git push
