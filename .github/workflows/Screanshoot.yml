name: Clone Single Page (Exact, No Extra Links)

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Exact page URL'
        required: true
      password:
        description: 'Encryption password'
        required: true
      archive_name:
        description: 'Archive name'
        default: 'single-page'
      split_size:
        description: 'Split size'
        default: '100m'
      output_dir:
        description: 'Output directory'
        default: 'splits'

jobs:
  clone:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install tools
      run: sudo apt-get update && sudo apt-get install -y wget p7zip-full
    - name: Download page + assets (zero extra HTML)
      run: |
        mkdir page_clone
        cd page_clone
        wget --recursive --level=0 --page-requisites \
             --convert-links --adjust-extension \
             --no-directories --span-hosts \
             "${{ inputs.url }}"
    - name: Create split encrypted archive
      run: |
        7z a -t7z -v"${{ inputs.split_size }}" -p"${{ inputs.password }}" -mhe=on "${{ inputs.archive_name }}.7z" ./page_clone
        rm -rf page_clone
    - name: Commit and push
      run: |
        mkdir -p "${{ inputs.output_dir }}"
        mv "${{ inputs.archive_name }}.7z".* "${{ inputs.output_dir }}/"
        git config user.name "${{ github.actor }}"
        git config user.email "${{ github.actor }}@users.noreply.github.com"
        git add "${{ inputs.output_dir }}"
        git commit -m "Single-page clone of ${{ inputs.url }}" || echo "No changes"
        git push
